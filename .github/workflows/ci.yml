name: CI

# Host unit tests + STM32F429 cross-compile on every push/PR.
on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Host unit tests
        run: make -C firmware test

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Arm GNU toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'
      - name: Cross-compile engine for STM32F429
        run: make -C firmware engine
