name: CI

# Host unit tests + STM32F429 build on every push/PR; tagged builds publish a release.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Host unit tests
        run: make -C firmware test

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Arm GNU toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'
      - name: Cross-compile engine (compile-only proof)
        run: make -C firmware engine
      - name: Build flashable firmware image
        run: make -C firmware firmware
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: b288-community-fw
          path: |
            firmware/build/fw/b288-community.hex
            firmware/build/fw/b288-community.bin
          if-no-files-found: error

  release:
    # On a vX.Y.Z tag, after tests + build pass, attach the image to a GitHub Release.
    needs: [ host-tests, firmware ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Arm GNU toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'
      - name: Build release image
        run: make -C firmware firmware
      - name: Publish release with .hex/.bin
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            firmware/build/fw/b288-community.hex \
            firmware/build/fw/b288-community.bin \
            --title "b288 community firmware ${GITHUB_REF_NAME}" \
            --generate-notes
