name: CI

# Host unit tests + STM32F429 build on every push/PR; tagged builds publish a release.
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

jobs:
  host-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Host unit tests
        run: make -C firmware test

  firmware:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Arm GNU toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'
      - name: Cross-compile engine (compile-only proof)
        run: make -C firmware engine
      - name: Build flashable firmware image
        run: make -C firmware firmware
      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: b288-community-fw
          path: |
            firmware/build/fw/b288-community.hex
            firmware/build/fw/b288-community.bin
          if-no-files-found: error

  release:
    # On a vX.Y.Z tag, after tests + build pass, attach the image to a GitHub Release.
    needs: [ host-tests, firmware ]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Arm GNU toolchain
        uses: carlosperate/arm-none-eabi-gcc-action@v1
        with:
          release: '13.3.Rel1'
      - name: Build release image
        run: make -C firmware firmware
      - name: Package one-click flasher (Easel Weasel)
        run: |
          cp firmware/build/fw/b288-community.hex flasher/firmware/
          # `zip` preserves the executable bit on the .command/.sh launchers
          zip -r 288r-Flasher.zip flasher -x "flasher/__pycache__/*" "flasher/**/*.pyc"
      - name: Publish release with .hex/.bin + flasher zip
        env:
          GH_TOKEN: ${{ github.token }}
        # Release body = docs/release-notes-<tag>.md when present (the repo
        # convention: New features / Fixed / Known & open issues sections),
        # falling back to generated notes + the install line.
        run: |
          NOTES="docs/release-notes-${GITHUB_REF_NAME}.md"
          PRE=""
          case "${GITHUB_REF_NAME}" in *-*) PRE="--prerelease";; esac
          EXTRA="**Easiest install:** download \`288r-Flasher.zip\`, unzip, double-click the file for your OS with the ST-Link plugged in."
          if [ -f "$NOTES" ]; then
            { cat "$NOTES"; echo; echo "$EXTRA"; } > /tmp/relnotes.md
            gh release create "${GITHUB_REF_NAME}" $PRE \
              firmware/build/fw/b288-community.hex \
              firmware/build/fw/b288-community.bin \
              288r-Flasher.zip \
              --title "b288 community firmware ${GITHUB_REF_NAME}" \
              --notes-file /tmp/relnotes.md
            exit 0
          fi
          gh release create "${GITHUB_REF_NAME}" $PRE \
            firmware/build/fw/b288-community.hex \
            firmware/build/fw/b288-community.bin \
            288r-Flasher.zip \
            --title "b288 community firmware ${GITHUB_REF_NAME}" \
            --generate-notes \
            --notes "**Easiest install:** download \`288r-Flasher.zip\`, unzip, double-click the file for your OS (Flash-on-Mac / Flash-on-Windows / Flash-on-Linux) with the ST-Link plugged in. macOS: right-click → Open the first time (Gatekeeper). Needs openocd, stlink-tools, or STM32CubeProgrammer installed."
